<body>

<div class="container">

<div class="badge">⚡ AI Powered</div>

<h1>ListingGennie</h1>
<p class="sub">Generate high-converting product listings in seconds</p>

<!-- 🔀 TOGGLE BUTTONS -->
<button onclick="showGenerator()">✨ Listing Generator</button>
<button onclick="showProducts()">🔥 Winning Products</button>

<!-- ================= GENERATOR ================= -->
<div id="generatorBox">

<input id="productName" placeholder="Enter product name"/>

<select id="platform">
<option>Shopify</option>
<option>Amazon</option>
<option>Dropshipping</option>
<option>Flipkart</option>
</select>

<select id="tone">
<option>Professional</option>
<option>Casual</option>
<option>Luxury</option>
<option>Persuasive</option>
</select>

<input id="keywords" placeholder="Keywords (optional)"/>

<button onclick="handleGenerate()">✨ Generate Listing</button>

<div class="loader" id="loader">⏳ Generating...</div>

<div id="resultBox" style="display:none">

<div class="result">
<b>Title</b>
<span class="copy" onclick="copy('title')">Copy</span>
<p id="title"></p>
</div>

<div class="result">
<b>Description</b>
<span class="copy" onclick="copy('desc')">Copy</span>
<p id="desc"></p>
</div>

<div class="result">
<b>Bullets</b>
<span class="copy" onclick="copy('bullets')">Copy</span>
<p id="bullets"></p>
</div>

</div>

</div>

<!-- ================= PRODUCTS ================= -->
<div id="productsBox" style="display:none">

<select id="category">
<option>All Categories</option>
<option>Beauty</option>
<option>Electronics</option>
<option>Fitness</option>
<option>Home</option>
</select>

<select id="country">
<option>Global</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select>

<button onclick="findProducts()">🚀 Find Products</button>

<div id="results"></div>

</div>

</div>

<script>

// 🔀 SWITCH UI
function showGenerator(){
  document.getElementById("generatorBox").style.display = "block";
  document.getElementById("productsBox").style.display = "none";
}

function showProducts(){
  document.getElementById("generatorBox").style.display = "none";
  document.getElementById("productsBox").style.display = "block";
}

// ================= LISTING =================
async function handleGenerate(){
  const product = document.getElementById("productName").value;

  if(!product){
    alert("Enter product name");
    return;
  }

  document.getElementById("loader").style.display="block";

  setTimeout(()=>{
    document.getElementById("loader").style.display="none";

    document.getElementById("title").innerText = "🔥 " + product + " – Must Buy Product";
    document.getElementById("desc").innerText = "High quality " + product + " with amazing results.";
    document.getElementById("bullets").innerText = "✔ High demand\n✔ Trending\n✔ Profitable";

    document.getElementById("resultBox").style.display="block";
  },1000);
}

// ================= PRODUCTS =================
async function findProducts(){

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "⏳ Loading...";

  try{

    const res = await fetch("/api/products",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        random: Math.random() // 🔥 force fresh response
      })
    });

    const data = await res.json();

    displayProducts(data.products);

  }catch(err){
    resultsDiv.innerHTML = "❌ Error: " + err.message;
  }
}

function displayProducts(products){

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  products.forEach(p => {
    resultsDiv.innerHTML += `
      <div class="card">
        <div class="badge">${p.name}</div>
        <p><b>Demand:</b> ${p.demand}</p>
        <p><b>Profit:</b> ${p.profit}</p>
        <p><b>Audience:</b> ${p.audience}</p>
        <p><b>Why Viral:</b> ${p.viral}</p>
      </div>
    `;
  });

}

// COPY FIX
function copy(id){
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  console.log("Copied!");
}

</script>

</body>
