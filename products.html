<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winning Products</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
}

.container{
  max-width:700px;
  margin:30px auto;
  padding:20px;
}

h1{
  text-align:center;
}

select, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#0d9488;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.badge{
  background:#0d9488;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
}
</style>

</head>
<body>

<div class="container">

<!-- 🔙 BACK BUTTON -->
<button onclick="goBack()">⬅ Back</button>

<h1>🔥 Winning Products</h1>

<!-- FILTERS -->
<select id="category">
<option>All Categories</option>
<option>Beauty</option>
<option>Electronics</option>
<option>Fitness</option>
<option>Home</option>
</select>

<select id="country">
<option>Global</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select>

<button onclick="findProducts()">🚀 Find Products</button>

<div id="results"></div>

</div>

<script>

function goBack(){
  window.location.href = "index.html";
}

async function findProducts(){

  const category = document.getElementById("category").value;
  const country = document.getElementById("country").value;

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "⏳ Finding winning products...";

  try{

    const res = await fetch("/api/products",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        category,
        country
      })
    });

    // 🔥 SAFE RESPONSE FIX
    const text = await res.text();

    let data;

    try{
      data = JSON.parse(text);
    }catch{
      console.log("RAW RESPONSE:", text);
      resultsDiv.innerHTML = "❌ Server Error (Not JSON)";
      return;
    }

    if(data.error){
      resultsDiv.innerHTML = "❌ " + data.error;
      return;
    }

    displayProducts(data.products);

  }catch(err){
    resultsDiv.innerHTML = "❌ Error: " + err.message;
  }
}

function displayProducts(products){

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if(!products || products.length === 0){
    resultsDiv.innerHTML = "❌ No products found";
    return;
  }

  products.forEach(p => {

    resultsDiv.innerHTML += `
      <div class="card">
        <div class="badge">${p.name || "Product"}</div>

        <p><b>📈 Demand:</b> ${p.demand || "-"}</p>
        <p><b>💰 Profit:</b> ${p.profit || "-"}</p>
        <p><b>🎯 Audience:</b> ${p.audience || "-"}</p>
        <p><b>🔥 Why Viral:</b> ${p.viral || "-"}</p>
      </div>
    `;

  });

}

</script>

</body>
</html>
