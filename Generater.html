<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generator – ListingGennie</title>
</head>

<body>

<h2>Listing Generator</h2>

<input type="text" id="productName" placeholder="Product Name"/>
<br><br>

<input type="text" id="keywords" placeholder="Keywords"/>
<br><br>

<button onclick="generate()">Generate</button>

<p id="loader" style="display:none;">Loading...</p>
<p id="errorBox" style="color:red;"></p>

<h3>Title:</h3>
<p id="titleResult"></p>

<h3>Description:</h3>
<p id="descResult"></p>

<h3>Bullets:</h3>
<p id="bulletsResult"></p>

<!-- ✅ SCRIPT LAST ME -->
<script>
async function generate() {
  console.log("🔥 GENERATE STARTED");

  const productName = document.getElementById("productName").value.trim();
  const keywords = document.getElementById("keywords").value.trim();

  const errorBox = document.getElementById("errorBox");
  const loader = document.getElementById("loader");

  errorBox.innerText = "";

  if (!productName) {
    errorBox.innerText = "❌ Product name required";
    return;
  }

  try {
    loader.style.display = "block";

    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        product: productName,
        keywords: keywords
      })
    });

    const data = await res.json();
    console.log(data);

    alert(JSON.stringify(data));
    loader.style.display = "none";

    if (!res.ok) {
      throw new Error(data.error || "Something went wrong");
    }

    document.getElementById("titleResult").innerText = data.title;
    document.getElementById("descResult").innerText = data.description;
    document.getElementById("bulletsResult").innerText = data.bullets;

  } catch (err) {
    loader.style.display = "none";
    errorBox.innerText = "❌ " + err.message;
  }
}
</script>

</body>
</html>
