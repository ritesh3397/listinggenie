<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListingGennie</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a,#0d9488);
  margin:0;
  color:#0f172a;
}

.container{
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:#64748b;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#0d9488;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#0f766e;
}

.loader{
  text-align:center;
  display:none;
  margin-top:20px;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f1f5f9;
}

.copy{
  float:right;
  cursor:pointer;
  color:#0d9488;
  font-size:12px;
}

.badge{
  display:inline-block;
  background:#0d9488;
  color:white;
  padding:5px 10px;
  border-radius:50px;
  font-size:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="badge">⚡ AI Powered</div>

<h1>ListingGennie</h1>
<p class="sub">Generate high-converting product listings in seconds</p>

<input id="productName" placeholder="Enter product name"/>

<select id="platform">
<option>Shopify</option>
<option>Amazon</option>
<option>Dropshipping</option>
<option>Flipkart</option>
</select>

<select id="tone">
<option>Professional</option>
<option>Casual</option>
<option>Luxury</option>
<option>Persuasive</option>
</select>

<input id="keywords" placeholder="Keywords (optional)"/>

<button onclick="generate()">✨ Generate Listing</button>

<div class="loader" id="loader">⏳ Generating magic...</div>

<div id="resultBox" style="display:none">

<div class="result">
<b>Title</b>
<span class="copy" onclick="copy('title')">Copy</span>
<p id="title"></p>
</div>

<div class="result">
<b>Description</b>
<span class="copy" onclick="copy('desc')">Copy</span>
<p id="desc"></p>
</div>

<div class="result">
<b>Bullets</b>
<span class="copy" onclick="copy('bullets')">Copy</span>
<p id="bullets"></p>
</div>

<button onclick="generate()">🔁 Regenerate</button>

</div>

</div>

<script>

async function generate(){
  const product = document.getElementById("productName").value.trim();
  const platform = document.getElementById("platform").value;
  const tone = document.getElementById("tone").value;
  const keywords = document.getElementById("keywords").value;

  if(!product){
    alert("Enter product name");
    return;
  }

  document.getElementById("loader").style.display="block";
  document.getElementById("resultBox").style.display="none";

  try{
    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ product, platform, tone, keywords })
    });

    // 🔥 SAFE RESPONSE HANDLING
    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch{
      console.log("RAW:", text);
      throw new Error(text);
    }

    document.getElementById("loader").style.display="none";

    if(data.error){
      alert(data.error);
      return;
    }

    document.getElementById("title").innerText = data.title || "No title";
    document.getElementById("desc").innerText = data.description || "No description";
    document.getElementById("bullets").innerText = data.bullets || "No bullets";

    document.getElementById("resultBox").style.display="block";

  }catch(err){
    document.getElementById("loader").style.display="none";
    alert("❌ Error: " + err.message);
  }
}

function copy(id){
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

</script>

</body>
</html>
