<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ListingGennie – AI Product Listing Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #1de9b6;
      --teal-mid: #00bfa5;
      --teal-dark: #009688;
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.4);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #020c10 0%, #041a1f 40%, #062428 70%, #020c10 100%);
      display: flex; align-items: flex-start; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 28px 20px 60px;
      overflow-x: hidden;
      position: relative;
    }

    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .orb1 { width: 340px; height: 340px; top: 5%; left: 0%; background: radial-gradient(circle, rgba(29,233,182,0.09) 0%, transparent 70%); animation: orb1 9s ease-in-out infinite; }
    .orb2 { width: 260px; height: 260px; bottom: 5%; right: 0%; background: radial-gradient(circle, rgba(0,150,136,0.08) 0%, transparent 70%); animation: orb2 11s ease-in-out infinite; }

    @keyframes orb1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-18px)} }
    @keyframes orb2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-25px,14px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes pulse-ring { 0%{transform:scale(0.8);opacity:0.6} 100%{transform:scale(1.4);opacity:0} }
    @keyframes resultIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .card {
      width: 100%; max-width: 440px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border); border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeUp 0.6s ease both;
      position: relative; z-index: 1;
    }

    /* Nav */
    .top-nav { padding: 18px 22px 0; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-dot-wrap { position: relative; display:flex; align-items:center; justify-content:center; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); position: relative; z-index: 1; }
    .logo-ring { position:absolute; width:16px; height:16px; border-radius:50%; border:1px solid rgba(29,233,182,0.5); animation:pulse-ring 1.5s ease-out infinite; }
    .logo-text { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:#fff; letter-spacing:.02em; }
    .nav-tabs { display:flex; gap:5px; }
    .nav-btn { padding:5px 11px; border-radius:20px; font-size:11px; font-weight:600; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); cursor:pointer; outline:none; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
    .nav-btn:hover { background:rgba(255,255,255,0.07); }
    .nav-btn.active { background:rgba(29,233,182,0.12); border-color:rgba(29,233,182,0.3); color:var(--teal); }

    /* Views */
    .view { padding:22px 22px 26px; display:none; }
    .view.active { display:block; animation:fadeIn 0.35s ease both; }

    /* Sub tabs */
    .sub-tabs { display:flex; gap:8px; margin-bottom:20px; }
    .sub-tab { flex:1; padding:9px 10px; border-radius:12px; font-size:12px; font-weight:600; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); color:rgba(255,255,255,0.4); cursor:pointer; outline:none; font-family:'DM Sans',sans-serif; transition:all 0.2s; text-align:center; }
    .sub-tab:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.6); }
    .sub-tab.active { background:rgba(29,233,182,0.1); border-color:rgba(29,233,182,0.3); color:var(--teal); }

    /* Title */
    .main-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; color:#fff; line-height:1.15; margin-bottom:5px; }
    .main-title span { background:linear-gradient(90deg,var(--teal),var(--teal-mid)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .subtitle { font-size:12px; color:var(--muted); margin-bottom:16px; line-height:1.6; }

    /* Credit */
    .credit-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .credit-label { font-size:10px; font-weight:600; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:.08em; }
    .credit-val { font-size:11px; font-weight:700; color:var(--teal); }
    .credit-bar-bg { height:4px; background:rgba(255,255,255,0.06); border-radius:4px; overflow:hidden; margin-bottom:18px; }
    .credit-bar-fill { height:100%; background:linear-gradient(90deg,var(--teal),var(--teal-mid)); border-radius:4px; }

    /* Labels + Inputs */
    .field-label { display:block; font-size:10px; font-weight:600; color:rgba(255,255,255,0.35); letter-spacing:.1em; text-transform:uppercase; margin-bottom:5px; }
    .field-wrap { position:relative; margin-bottom:11px; }
    .field-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; z-index:1; }
    .field-input { width:100%; padding:11px 13px 11px 38px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:11px; color:#fff; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500; outline:none; transition:border .2s, box-shadow .2s; }
    .field-input::placeholder { color:rgba(255,255,255,0.22); }
    .field-input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(29,233,182,0.1); }

    /* Combobox */
    .combo-wrap { position:relative; margin-bottom:11px; }
    .combo-input-wrap { position:relative; }
    .combo-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; z-index:1; }
    .combo-arrow { position:absolute; right:11px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.3); font-size:10px; cursor:pointer; transition:transform .2s; user-select:none; z-index:2; }
    .combo-arrow.open { transform:translateY(-50%) rotate(180deg); }
    .combo-input { width:100%; padding:11px 32px 11px 38px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:11px; color:#fff; font-size:13px; font-family:'DM Sans',sans-serif; font-weight:500; outline:none; transition:border .2s, box-shadow .2s; }
    .combo-input::placeholder { color:rgba(255,255,255,0.22); }
    .combo-input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(29,233,182,0.1); }
    .combo-input.dopen { border-radius:11px 11px 0 0; }
    .combo-dropdown { position:absolute; top:100%; left:0; right:0; z-index:99; background:#062428; border:1px solid rgba(29,233,182,0.25); border-top:none; border-radius:0 0 11px 11px; max-height:148px; overflow-y:auto; box-shadow:0 16px 40px rgba(0,0,0,0.5); display:none; }
    .combo-dropdown.open { display:block; }
    .combo-option { padding:9px 13px 9px 36px; font-size:13px; cursor:pointer; color:rgba(255,255,255,0.7); position:relative; border-bottom:1px solid rgba(255,255,255,0.04); transition:background .15s; }
    .combo-option:last-child { border-bottom:none; }
    .combo-option:hover { background:rgba(29,233,182,0.07); }
    .combo-option.selected { color:var(--teal); font-weight:600; background:rgba(29,233,182,0.08); }
    .combo-option.selected::before { content:'✓'; position:absolute; left:13px; font-size:10px; color:var(--teal); }
    .combo-nores { padding:10px 13px; font-size:12px; color:rgba(255,255,255,0.3); }

    /* Buttons */
    .btn-primary { width:100%; padding:13px 22px; background:linear-gradient(135deg,var(--teal) 0%,var(--teal-mid) 50%,var(--teal-dark) 100%); border:none; border-radius:13px; font-size:14px; font-weight:700; color:#041a1f; font-family:'DM Sans',sans-serif; cursor:pointer; box-shadow:0 8px 28px rgba(29,233,182,0.22); display:flex; align-items:center; justify-content:center; gap:8px; position:relative; overflow:hidden; outline:none; transition:transform .15s, box-shadow .15s; }
    .btn-primary::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); background-size:200% 100%; animation:shimmer 2s infinite; }
    .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 36px rgba(29,233,182,0.38); }
    .btn-primary:disabled { background:rgba(29,233,182,0.28); color:rgba(255,255,255,0.45); cursor:not-allowed; transform:none; }

    .spinner { width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; animation:spin .8s linear infinite; display:none; flex-shrink:0; }

    /* Result */
    .result-section { margin-top:18px; background:rgba(255,255,255,0.02); border:1px solid rgba(29,233,182,0.15); border-radius:16px; overflow:hidden; display:none; animation:resultIn 0.5s ease both; }
    .result-section.visible { display:block; }
    .result-header { padding:11px 15px; background:rgba(29,233,182,0.06); border-bottom:1px solid rgba(29,233,182,0.12); display:flex; align-items:center; gap:8px; }
    .result-header-dot { width:6px; height:6px; border-radius:50%; background:var(--teal); flex-shrink:0; }
    .result-header-text { font-size:10px; font-weight:700; color:var(--teal); letter-spacing:.08em; text-transform:uppercase; }
    .result-header-badge { margin-left:auto; font-size:10px; color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); padding:2px 8px; border-radius:20px; }
    .result-block { padding:13px 15px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .result-block:last-child { border-bottom:none; }
    .result-block-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
    .result-block-label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:.1em; }
    .copy-btn { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; background:rgba(29,233,182,0.08); border:1px solid rgba(29,233,182,0.2); color:var(--teal); cursor:pointer; outline:none; font-family:'DM Sans',sans-serif; transition:all .2s; }
    .copy-btn:hover { background:rgba(29,233,182,0.15); }
    .copy-btn.copied { background:rgba(29,233,182,0.2); color:#fff; }
    .result-title-text { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#fff; line-height:1.4; }
    .result-desc-text { font-size:13px; color:rgba(255,255,255,0.68); line-height:1.65; }
    .result-bullets { list-style:none; display:flex; flex-direction:column; gap:6px; }
    .result-bullet { display:flex; align-items:flex-start; gap:8px; font-size:13px; color:rgba(255,255,255,0.68); line-height:1.5; }
    .bullet-dot { width:6px; height:6px; border-radius:50%; background:var(--teal); flex-shrink:0; margin-top:6px; }

    /* Winning cards */
    .winning-result { margin-top:16px; display:none; flex-direction:column; gap:8px; animation:resultIn .5s ease both; }
    .winning-result.visible { display:flex; }
    .w-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:13px; }
    .w-rank { font-size:10px; font-weight:700; color:var(--teal); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
    .w-name { font-size:14px; font-weight:700; color:#fff; margin-bottom:3px; }
    .w-meta { font-size:11px; color:rgba(255,255,255,0.35); margin-bottom:7px; }
    .w-tag { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10px; font-weight:600; background:rgba(29,233,182,0.08); border:1px solid rgba(29,233,182,0.18); color:var(--teal); margin:2px; }

    /* Profile */
    .profile-header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .avatar { width:58px; height:58px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--teal-dark)); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; color:#041a1f; font-family:'Syne',sans-serif; box-shadow:0 0 0 3px rgba(29,233,182,0.2); position:relative; flex-shrink:0; }
    .avatar-dot { position:absolute; bottom:2px; right:2px; width:11px; height:11px; border-radius:50%; background:var(--teal); border:2px solid #041a1f; }
    .profile-name { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:#fff; margin-bottom:2px; }
    .profile-email { font-size:11px; color:rgba(255,255,255,0.38); margin-bottom:5px; }
    .plan-badge { display:inline-block; background:rgba(29,233,182,0.1); border:1px solid rgba(29,233,182,0.25); color:var(--teal); font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.06em; }
    .credit-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:14px; margin-bottom:12px; }
    .stats-row { display:flex; gap:7px; margin-bottom:12px; }
    .stat-tile { flex:1; text-align:center; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:11px 5px; transition:all .2s; }
    .stat-tile:hover { border-color:rgba(29,233,182,0.22); background:rgba(29,233,182,0.04); }
    .stat-val { font-size:17px; font-weight:700; color:var(--teal); font-family:'Syne',sans-serif; }
    .stat-lbl { font-size:10px; color:rgba(255,255,255,0.28); font-weight:500; margin-top:2px; }
    .upgrade-card { background:linear-gradient(135deg,rgba(29,233,182,0.07),rgba(0,150,136,0.04)); border:1px solid rgba(29,233,182,0.18); border-radius:14px; padding:14px; margin-bottom:12px; }
    .upgrade-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:11px; }
    .upgrade-title { font-size:13px; font-weight:700; color:#fff; margin-bottom:2px; }
    .upgrade-sub { font-size:11px; color:rgba(255,255,255,0.38); }
    .upgrade-price { font-size:17px; font-weight:800; color:var(--teal); font-family:'Syne',sans-serif; }
    .btn-upgrade { width:100%; padding:10px; border-radius:11px; font-size:13px; font-weight:700; background:linear-gradient(135deg,var(--teal),var(--teal-dark)); border:none; color:#041a1f; font-family:'DM Sans',sans-serif; cursor:pointer; box-shadow:0 5px 20px rgba(29,233,182,0.18); outline:none; display:flex; align-items:center; justify-content:center; gap:6px; position:relative; overflow:hidden; transition:transform .15s, box-shadow .15s; }
    .btn-upgrade::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.13),transparent); background-size:200% 100%; animation:shimmer 2s infinite; }
    .btn-upgrade:hover { transform:translateY(-1px); box-shadow:0 9px 28px rgba(29,233,182,0.32); }
    .menu-list { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
    .menu-item { display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:11px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background .2s; }
    .menu-item:hover { background:rgba(255,255,255,0.05); }
    .menu-icon { font-size:17px; }
    .menu-title { font-size:13px; font-weight:600; color:rgba(255,255,255,0.75); }
    .menu-sub { font-size:10px; color:rgba(255,255,255,0.28); margin-top:1px; }
    .menu-arrow { margin-left:auto; color:rgba(255,255,255,0.18); font-size:13px; }
    .btn-logout { width:100%; padding:10px; background:rgba(255,80,80,0.06); border:1px solid rgba(255,80,80,0.11); border-radius:11px; font-size:13px; font-weight:600; color:rgba(255,100,100,0.65); font-family:'DM Sans',sans-serif; cursor:pointer; outline:none; transition:all .2s; }
    .btn-logout:hover { background:rgba(255,80,80,0.12); color:#ff6464; }

    .footer-note { margin-top:16px; font-size:10px; color:rgba(255,255,255,0.16); text-align:center; }
    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:rgba(29,233,182,0.28); border-radius:4px; }
  </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">

  <!-- Nav -->
  <div class="top-nav">
    <div class="logo">
      <div class="logo-dot-wrap">
        <div class="logo-dot"></div>
        <div class="logo-ring"></div>
      </div>
      <span class="logo-text">ListingGennie</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-btn active" onclick="switchView('generator',this)">⚡ Generator</button>
      <button class="nav-btn" onclick="switchView('profile',this)">👤 Profile</button>
    </div>
  </div>

  <!-- GENERATOR -->
  <div id="view-generator" class="view active">
    <h1 class="main-title">Generate a<br><span>Winning Listing</span></h1>
    <p class="subtitle">High-converting product listings in seconds.</p>

    <div class="credit-row">
      <span class="credit-label">Credits</span>
      <span class="credit-val">7 / 10</span>
    </div>
    <div class="credit-bar-bg"><div class="credit-bar-fill" style="width:70%"></div></div>

    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchSub('listing',this)">✨ Listing Generator</button>
      <button class="sub-tab" onclick="switchSub('winning',this)">🔥 Winning Products</button>
    </div>

    <!-- Listing sub -->
    <div id="sub-listing">
      <div class="field-wrap">
        <label class="field-label">Product Name</label>
        <span class="field-icon">📦</span>
        <input class="field-input" id="productName" type="text" placeholder="e.g. Vitamin C Face Serum" />
      </div>

      <div class="combo-wrap" id="cb-platform">
        <label class="field-label">Platform</label>
        <div class="combo-input-wrap">
          <span class="combo-icon">🛒</span>
          <input class="combo-input" type="text" placeholder="Select platform..." autocomplete="off" />
          <span class="combo-arrow" onclick="toggleCb('cb-platform')">▼</span>
        </div>
        <div class="combo-dropdown">
          <div class="combo-option" data-value="Shopify">Shopify</div>
          <div class="combo-option" data-value="Amazon">Amazon</div>
          <div class="combo-option" data-value="Etsy">Etsy</div>
          <div class="combo-option" data-value="eBay">eBay</div>
          <div class="combo-option" data-value="Dropshipping">Dropshipping</div>
          <div class="combo-option" data-value="WooCommerce">WooCommerce</div>
          <div class="combo-option" data-value="Flipkart">Flipkart</div>
          <div class="combo-option" data-value="Meesho">Meesho</div>
          <div class="combo-option" data-value="TikTok Shop">TikTok Shop</div>
        </div>
      </div>

      <div class="combo-wrap" id="cb-tone">
        <label class="field-label">Tone</label>
        <div class="combo-input-wrap">
          <span class="combo-icon">🎯</span>
          <input class="combo-input" type="text" placeholder="Select tone..." autocomplete="off" />
          <span class="combo-arrow" onclick="toggleCb('cb-tone')">▼</span>
        </div>
        <div class="combo-dropdown">
          <div class="combo-option" data-value="Professional">Professional</div>
          <div class="combo-option" data-value="Casual">Casual</div>
          <div class="combo-option" data-value="Luxury">Luxury</div>
