<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListingGennie</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

.container{
  max-width:700px;
  margin:30px auto;
  padding:20px;
}

h1{text-align:center;}

input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#0d9488;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.copy-btn{
  float:right;
  cursor:pointer;
  font-size:12px;
  color:#0d9488;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 ListingGennie</h1>

<input id="productName" placeholder="Enter product name">

<button onclick="handleGenerate()">✨ Generate Listing</button>
<button onclick="findWinning()">🔥 Winning Products</button>

<!-- RESULT -->
<div id="resultBox" style="display:none">

<div class="card">
<b>Title</b>
<span class="copy-btn" onclick="copyText('titleText',this)">Copy</span>
<p id="titleText"></p>
</div>

<div class="card">
<b>Description</b>
<span class="copy-btn" onclick="copyText('descText',this)">Copy</span>
<p id="descText"></p>
</div>

<div class="card">
<b>Bullets</b>
<ul id="bulletsList"></ul>
</div>

</div>

<!-- WINNING -->
<div id="winningBox"></div>

</div>

<script>

// 🔥 GENERATE LISTING
async function handleGenerate(){

  const product = document.getElementById("productName").value.trim();

  if(!product){
    alert("Enter product name");
    return;
  }

  try{

    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ product })
    });

    const data = await res.json();

    console.log("DATA:", data);

    // ✅ UI UPDATE
    document.getElementById("titleText").innerText = data.title || "No title";
    document.getElementById("descText").innerText = data.description || "No description";

    const bullets = Array.isArray(data.bullets) ? data.bullets : [];

    // 🔥 UPDATED BULLETS WITH COPY BUTTON
    document.getElementById("bulletsList").innerHTML =
      bullets.map((b,i)=>`
        <li>
          ${b}
          <span class="copy-btn" onclick="copyBullet(${i}, this)">Copy</span>
        </li>
      `).join("");

    document.getElementById("resultBox").style.display = "block";

  }catch(err){
    alert("❌ " + err.message);
  }
}
    
// 🔥 WINNING PRODUCTS
async function findWinning(){

  const box = document.getElementById("winningBox");
  box.innerHTML = "⏳ Loading...";

  try{

    const res = await fetch("/api/products",{
      method:"POST",
      headers:{ "Content-Type":"application/json" }
    });

    const data = await res.json();

    box.innerHTML = "";

    (data.products || []).forEach((p,i)=>{
      box.innerHTML += `
        <div class="card">
          <b>#${i+1} ${p.name}</b>
          <p>Demand: ${p.demand}</p>
          <p>Profit: ${p.profit}</p>
          <p>${p.viral}</p>
        </div>
      `;
    });

  }catch(err){
    box.innerHTML = "❌ " + err.message;
  }
}


// 🔥 COPY TITLE/DESC
function copyText(id,btn){

  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);

  btn.innerText = "Copied!";
  setTimeout(()=>btn.innerText="Copy",1500);
}


// 🔥 COPY BULLETS (NEW)
function copyBullet(index, btn){

  const bullets = document.querySelectorAll("#bulletsList li");
  const text = bullets[index].childNodes[0].textContent.trim();

  navigator.clipboard.writeText(text);

  btn.innerText = "Copied!";
  setTimeout(()=>btn.innerText="Copy",1500);
}

</script>

</body>
</html>
