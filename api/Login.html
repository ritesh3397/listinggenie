<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – ListingGennie</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#0d9488;--teal-l:#14b8a6;--teal-d:#0f766e;--glow:rgba(13,148,136,0.12);--text:#134e4a}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#f0fdfa 0%,#ffffff 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
    .logo{display:flex;align-items:center;gap:0.4rem;text-decoration:none;margin-bottom:2rem}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--teal-d)}
    .logo-text span{color:var(--teal-l)}
    .card{background:white;border:1px solid rgba(13,148,136,0.15);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(13,148,136,0.1)}
    h1{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);margin-bottom:0.3rem}
    .subtitle{color:#5a8f8a;font-size:0.9rem;margin-bottom:1rem;font-weight:300}
    .free-badge{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(13,148,136,0.1);color:var(--teal-d);padding:0.3rem 0.8rem;border-radius:50px;font-size:0.78rem;font-weight:600;margin-bottom:1.5rem;border:1px solid rgba(13,148,136,0.2)}
    .google-btn{width:100%;padding:0.85rem;border:1.5px solid rgba(13,148,136,0.2);border-radius:12px;background:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;color:var(--text);display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all 0.2s;margin-bottom:1.2rem}
    .google-btn:hover{background:var(--glow)}
    .divider{display:flex;align-items:center;gap:0.8rem;margin-bottom:1.2rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(13,148,136,0.15)}
    .divider span{font-size:0.78rem;color:#7db8b3}
    .form-group{margin-bottom:1.1rem}
    label{display:block;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:0.4rem}
    input{width:100%;padding:0.8rem 1rem;border:1.5px solid rgba(13,148,136,0.2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--text);outline:none;transition:all 0.2s}
    input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,0.1)}
    input::placeholder{color:#a0c8c4}
    .submit-btn{width:100%;padding:0.9rem;background:var(--teal);color:white;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.5rem}
    .submit-btn:hover{background:var(--teal-d)}
    .submit-btn:disabled{opacity:0.7;cursor:not-allowed}
    .bottom-text{text-align:center;margin-top:1.5rem;font-size:0.88rem;color:#5a8f8a}
    .bottom-text a{color:var(--teal);text-decoration:none;font-weight:500}
    .error-box{background:#fff1f0;border:1px solid #fca5a5;border-radius:8px;padding:0.7rem 1rem;color:#dc2626;font-size:0.85rem;margin-top:0.8rem;display:none}
    .error-box.show{display:block}
    .success-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:0.7rem 1rem;color:#16a34a;font-size:0.85rem;margin-top:0.8rem;display:none}
    .success-box.show{display:block}
  </style>
</head>
<body>
<a href="/" class="logo">
  <span class="logo-text">Listing<span>Gennie</span></span>
</a>
<div class="card">
  <h1>Create your account 🧞</h1>
  <p class="subtitle">Start generating listings for free</p>
  <div class="free-badge">🎁 10 Free Credits — No Card Needed</div>
  <button class="google-btn" onclick="signupWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
    Continue with Google
  </button>
  <div class="divider"><span>or sign up with email</span></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 6 characters"/>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat password"/>
  </div>
  <button class="submit-btn" id="signupBtn" onclick="signupWithEmail()">Create Free Account</button>
  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>
  <div class="bottom-text">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
  const SUPABASE_URL = 'https://odgroqveswuqlmpaydwc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kZ3JvcXZlc3d1cWxtcGF5ZHdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMzA1MDgsImV4cCI6MjA4ODcwNjUwOH0.Pu68pYzFSFFpoOEnyWKKG4LKGUk4idPnTEYu6McbNIg';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = '/generator';
  });
  async function signupWithGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/generator' }
    });
    if (error) showError(error.message);
  }
  async function signupWithEmail() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('signupBtn');
    if (!email || !password || !confirm) return showError('Please fill all fields!');
    if (password !== confirm) return showError('Passwords do not match!');
    if (password.length < 6) return showError('Password must be at least 6 characters!');
    btn.disabled = true; btn.textContent = 'Creating account...';
    const { error } = await sb.auth.signUp({ email, password });
    if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Create Free Account'; }
    else { document.getElementById('successBox').textContent = '✅ Account created! Check your email to confirm, then login.'; document.getElementById('successBox').classList.add('show'); btn.textContent = 'Check your email ✉️'; }
  }
  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg; box.classList.add('show');
  }
</script>
</body>
</html>
