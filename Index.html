<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListingGennie</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

.container{
  max-width:600px;
  margin:30px auto;
  padding:20px;
}

h1{text-align:center}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#0d9488;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

.tabs{
  display:flex;
  gap:10px;
}

.tabs button{
  flex:1;
  background:#1e293b;
}

.active{
  background:#0d9488 !important;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ ListingGennie</h1>

<!-- Tabs -->
<div class="tabs">
  <button id="tab1" class="active" onclick="showTab('listing')">Listing</button>
  <button id="tab2" onclick="showTab('products')">Winning Products</button>
</div>

<!-- 🔹 LISTING -->
<div id="listing">

<input id="productName" placeholder="Product name">

<select id="platform">
<option>Shopify</option>
<option>Amazon</option>
<option>Flipkart</option>
</select>

<select id="tone">
<option>Professional</option>
<option>Casual</option>
<option>Luxury</option>
</select>

<button onclick="generate()">✨ Generate</button>

<div id="listingResult"></div>

</div>

<!-- 🔹 PRODUCTS -->
<div id="products" style="display:none">

<select id="category">
<option>All</option>
<option>Beauty</option>
<option>Electronics</option>
<option>Fitness</option>
</select>

<select id="country">
<option>Global</option>
<option>India</option>
<option>USA</option>
</select>

<button onclick="findProducts()">🔥 Find Products</button>

<div id="productResult"></div>

</div>

</div>

<script>

function showTab(tab){
  document.getElementById("listing").style.display = tab==="listing"?"block":"none";
  document.getElementById("products").style.display = tab==="products"?"block":"none";

  document.getElementById("tab1").classList.remove("active");
  document.getElementById("tab2").classList.remove("active");

  document.getElementById(tab==="listing"?"tab1":"tab2").classList.add("active");
}

// 🔹 LISTING API
async function generate(){
  const product = document.getElementById("productName").value;

  if(!product){
    alert("Enter product");
    return;
  }

  const box = document.getElementById("listingResult");
  box.innerHTML = "⏳ Generating...";

  try{
    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({product})
    });

    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch{
      box.innerHTML = "❌ Server Error (Not JSON)";
      return;
    }

    box.innerHTML = `
      <div class="card">
        <b>${data.title}</b>
        <p>${data.description}</p>
      </div>
    `;

  }catch(err){
    box.innerHTML = "❌ " + err.message;
  }
}

// 🔹 PRODUCTS API
async function findProducts(){

  const category = document.getElementById("category").value;
  const country = document.getElementById("country").value;

  const box = document.getElementById("productResult");
  box.innerHTML = "⏳ Finding...";

  try{
    const res = await fetch("/api/products",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({category,country})
    });

    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch{
      box.innerHTML = "❌ Server Error (Not JSON)";
      return;
    }

    box.innerHTML = "";

    data.products.forEach(p=>{
      box.innerHTML += `
        <div class="card">
          <b>${p.name}</b>
          <p>Demand: ${p.demand}</p>
          <p>Profit: ${p.profit}</p>
        </div>
      `;
    });

  }catch(err){
    box.innerHTML = "❌ " + err.message;
  }
}

</script>

</body>
</html>
