<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winning Products</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a,#0d9488);
  margin:0;
  color:#0f172a;
}

.container{
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
  position:relative;
}

.back-btn{
  position:absolute;
  top:15px;
  left:15px;
  background:#0d9488;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

h1{
  text-align:center;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:#64748b;
  margin-bottom:20px;
}

select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button.main{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:#0d9488;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

.result{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#f1f5f9;
}

.badge{
  display:inline-block;
  background:#0d9488;
  color:white;
  padding:5px 10px;
  border-radius:50px;
  font-size:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<button class="back-btn" onclick="goBack()">⬅</button>

<div class="badge">🔥 AI Winning Finder</div>

<h1>Winning Products</h1>
<p class="sub">Discover top products based on filters</p>

<!-- 🔥 FILTERS -->
<select id="category">
  <option value="all">All Categories</option>
  <option value="gadgets">Gadgets</option>
  <option value="fitness">Fitness</option>
  <option value="beauty">Beauty</option>
  <option value="home">Home</option>
</select>

<select id="country">
  <option value="global">Global</option>
  <option value="india">India</option>
  <option value="usa">USA</option>
  <option value="uk">UK</option>
</select>

<button class="main" onclick="findProducts()">🚀 Find Winning Products</button>

<div id="loader" style="display:none;margin-top:15px;">⏳ Finding winners...</div>

<div id="productsBox"></div>

</div>

<script>

function goBack(){
  window.location.href = "index.html";
}

async function findProducts(){
  const category = document.getElementById("category").value;
  const country = document.getElementById("country").value;

  document.getElementById("loader").style.display="block";
  document.getElementById("productsBox").innerHTML = "";

  try{
    const res = await fetch("/api/products",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({ category, country })
    });

    const data = await res.json();

    document.getElementById("loader").style.display="none";

    if(data.error){
      alert(data.error);
      return;
    }

    let html = "";

    data.products.forEach((p,i)=>{
      html += `
      <div class="result">
        <b>${i+1}. ${p.name}</b>

        <p>📈 Demand: ${p.demand}</p>
        <p>💰 Profit: ${p.profit}</p>
        <p>🎯 Audience: ${p.audience}</p>
        <p>🚀 ${p.viral_reason}</p>

        <canvas id="chart${i}" height="100"></canvas>

        <button onclick="useProduct('${p.name}')">✨ Generate Listing</button>
      </div>
      `;
    });

    document.getElementById("productsBox").innerHTML = html;

    data.products.forEach((p,i)=>{
      new Chart(document.getElementById(`chart${i}`),{
        type:'bar',
        data:{
          labels:['Demand','Profit'],
          datasets:[{
            data:[
              p.demand==="High"?90:p.demand==="Medium"?60:30,
              70
            ]
          }]
        }
      });
    });

  }catch(err){
    document.getElementById("loader").style.display="none";
    alert("❌ Error: " + err.message);
  }
}

function useProduct(name){
  localStorage.setItem("selectedProduct", name);
  window.location.href = "index.html";
}

</script>

</body>
</html>
